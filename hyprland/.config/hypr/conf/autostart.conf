#
# AUTOSTART
#
exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 21
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

## FOR KDE
#exec-once = /usr/lib/pam_kwallet_init
#exec-once = /usr/lib/polkit-kde-authentication-agent-1

# clipboard manager
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

exec-once = waybar & swaync & hyprpaper & hypridle & ktailctl


exec-once = $HOME/.config/hypr/handle_monitor_connect.sh

## AUTOSTART APPS
exec-once = [workspace 1 silent] zen-browser
exec-once = [workspace 2 silent] vesktop
exec-once = [workspace 3 silent] thunderbird
